name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q --cov --cov-report=term --cov-report=xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install pip-licenses
        run: pip install pip-licenses
      - name: Install project dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true
      - name: Export Python licenses
        run: |
          OUT=python-licenses.json
          pip-licenses --format=json --output-file="$OUT" || echo "[]" > "$OUT"
      - name: Check license compliance
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          ALLOW = {"MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Python-2.0", "PSF"}
          BLOCK = {"GPL", "AGPL", "UNKNOWN"}
          violations = []
          if os.path.exists("python-licenses.json"):
              with open("python-licenses.json") as f:
                  data = json.load(f)
              for pkg in data:
                  lic = pkg.get("License", "UNKNOWN")
                  name = pkg.get("Name", "unknown")
                  if any(b in lic for b in BLOCK):
                      violations.append("Python/" + name + ": " + lic)
                  elif not any(a in lic for a in ALLOW):
                      violations.append("Python/" + name + ": " + lic + " (not in allowlist)")
          if os.path.exists("node-licenses.json"):
              with open("node-licenses.json") as f:
                  data = json.load(f)
              for pkg, info in data.items():
                  lic = info.get("licenses", "UNKNOWN")
                  if isinstance(lic, list):
                      lic = ";".join(lic)
                  if any(b in lic for b in BLOCK):
                      violations.append("Node/" + pkg + ": " + lic)
                  elif not any(a in lic for a in ALLOW):
                      violations.append("Node/" + pkg + ": " + lic + " (not in allowlist)")
          if violations:
              print("LICENSE VIOLATIONS FOUND:")
              for v in violations:
                  print("  - " + v)
              sys.exit(1)
          print("All licenses compliant.")
          PYEOF

  actions-lint:
    name: GitHub Actions Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8  # v1.7.11

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config p/default \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --config p/command-injection \
            --config p/insecure-transport \
            --config p/python \
            --config p/bandit \
            --config p/ci \
            --sarif --output semgrep.sarif \
            --error \
            --verbose
      - name: Normalize SARIF severity for GitHub Code Scanning
        if: always()
        run: |
          jq 'walk(
            if type == "object" and has("security-severity") then
              .["security-severity"] |= (
                if . == "critical" or . == "Critical" then "9.5"
                elif . == "high" or . == "High" then "8.0"
                elif . == "medium" or . == "Medium" then "5.0"
                elif . == "low" or . == "Low" then "2.0"
                elif (tonumber? // null) != null then .
                else "0.0"
                end
              )
            else . end
          )' semgrep.sarif > semgrep-fixed.sarif
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3
        if: always()
        with:
          sarif_file: semgrep-fixed.sarif
          category: semgrep

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true
